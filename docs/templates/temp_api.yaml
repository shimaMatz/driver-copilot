openapi: 3.0.3
info:
  title: {{API_TITLE}}
  version: 0.1.0
  description: |
    docs/api.yaml のテンプレート。
    プロジェクトの `.claude/rules/api-conventions.md` に従いエラー形式・タグ命名を統一すること。
servers:
  - url: https://api.example.com/v1
    description: production
paths: {}
components:
  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: 機械可読なエラーコード
        message:
          type: string
          description: 人間向けメッセージ
        details:
          type: object
          additionalProperties: true
          description: 追加コンテキスト（任意）
